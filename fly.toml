# fly.toml app configuration file generated for grillexa on 2026-07-10T18:29:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'grillexa'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
