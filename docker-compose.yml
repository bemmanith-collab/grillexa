services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-string}
      - JWT_EXPIRES_IN=8h
      - PORT=4000
      - CORS_ORIGIN=http://localhost:8080
    volumes:
      - backend_data:/app/data
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
